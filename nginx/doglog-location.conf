# Add this location block to mint.local's nginx server block (grow.conf or equivalent).
# Doglog runs on port 8001, alongside grow (8000).
#
# In /etc/nginx/sites-enabled/grow.conf, inside the `server { listen 443 ssl; ... }` block, add:
#
#     location /doglog {
#         proxy_pass         http://localhost:8001;
#         proxy_set_header   Host $host;
#         proxy_set_header   X-Real-IP $remote_addr;
#         proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
#         proxy_set_header   X-Forwarded-Proto $scheme;
#     }
#
# Then: sudo nginx -t && sudo systemctl reload nginx

location /doglog {
    proxy_pass         http://localhost:8001;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
}
